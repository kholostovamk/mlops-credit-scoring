name: CI – Lint, Test & Sanity Train

on:
  push:
    branches-ignore:
      - main
  pull_request:
    branches:
      - main

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install flake8
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 src/ inference/ tests/ \
            --max-line-length=120 \
            --extend-ignore=E203,W503

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit tests with coverage
        run: |
          pytest tests/ -v \
            --cov=src \
            --cov=inference \
            --cov-report=xml \
            --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  sanity-train:
    name: Sanity Training (100-row smoke test)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Create smoke-test dataset
        run: |
          python - <<'EOF'
          import pandas as pd, numpy as np, os
          os.makedirs("data/staged", exist_ok=True)
          np.random.seed(42)
          n = 200
          cols = [
              "LIMIT_BAL","SEX","EDUCATION","MARRIAGE","AGE",
              "PAY_0","PAY_2","PAY_3","PAY_4","PAY_5","PAY_6",
              "BILL_AMT1","BILL_AMT2","BILL_AMT3","BILL_AMT4","BILL_AMT5","BILL_AMT6",
              "PAY_AMT1","PAY_AMT2","PAY_AMT3","PAY_AMT4","PAY_AMT5","PAY_AMT6",
              "DEFAULT",
          ]
          df = pd.DataFrame(np.random.randn(n, len(cols)-1), columns=cols[:-1])
          df["LIMIT_BAL"] = np.abs(df["LIMIT_BAL"]) * 50000
          df["SEX"] = np.random.choice([1,2], n)
          df["EDUCATION"] = np.random.choice([1,2,3], n)
          df["MARRIAGE"] = np.random.choice([1,2,3], n)
          df["AGE"] = np.random.randint(22, 65, n)
          df["DEFAULT"] = np.random.choice([0,1], n, p=[0.78, 0.22])
          df.to_csv("data/staged/data.csv", index=False)
          print(f"Smoke dataset: {df.shape}")
          EOF

      - name: Sanity train (5 Optuna trials)
        env:
          MLFLOW_TRACKING_URI: /tmp/mlruns
        run: |
          # Override n_trials for speed
          sed -i 's/N_TRIALS = 20/N_TRIALS = 5/' src/train_and_tune.py
          python src/train_and_tune.py
          python src/evaluate.py

      - name: Check metrics output exists
        run: |
          test -f metrics/metrics.json && echo "metrics.json OK"
          cat metrics/metrics.json
