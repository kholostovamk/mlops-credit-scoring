groups:
  - name: inference_alerts
    rules:

      # ── Latency ────────────────────────────────────────────────────────────
      - alert: HighInferenceLatency
        expr: histogram_quantile(0.95, rate(inference_latency_seconds_bucket[5m])) > 1.0
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High p95 inference latency"
          description: "p95 latency > 1 s for 2 minutes (current: {{ $value | humanizeDuration }})"

      # ── Error rate ─────────────────────────────────────────────────────────
      - alert: HighErrorRate
        expr: rate(inference_errors_total[5m]) / rate(inference_requests_total[5m]) > 0.05
        for: 3m
        labels:
          severity: critical
        annotations:
          summary: "Inference error rate exceeds 5%"
          description: "Error rate = {{ $value | humanizePercentage }} over last 5 m"

      # ── Data drift ─────────────────────────────────────────────────────────
      - alert: DataDriftDetected
        expr: model_feature_drift_score > 0.1
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Feature drift detected"
          description: "Drift score = {{ $value }} (threshold 0.1) — consider retraining"

      # ── Prediction drift ───────────────────────────────────────────────────
      - alert: PredictionDrift
        expr: |
          abs(
            avg_over_time(model_prediction_mean[1h]) -
            avg_over_time(model_prediction_mean[24h] offset 24h)
          ) > 0.05
        for: 10m
        labels:
          severity: warning
        annotations:
          summary: "Prediction distribution shifted"
          description: "1-hour mean prediction deviated >5% from yesterday's 24-hour mean"

  - name: system_alerts
    rules:

      # ── CPU ────────────────────────────────────────────────────────────────
      - alert: HighCPUUsage
        expr: 100 - (avg by(instance)(rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "CPU usage above 80%"
          description: "Instance {{ $labels.instance }} CPU = {{ $value | humanize }}%"

      # ── Memory ────────────────────────────────────────────────────────────
      - alert: HighMemoryUsage
        expr: (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes) * 100 > 85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage above 85%"
          description: "Instance {{ $labels.instance }} memory = {{ $value | humanize }}%"
