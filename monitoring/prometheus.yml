global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - "alert_rules.yml"

scrape_configs:
  # Scrape Prometheus itself
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  # Scrape the Flask inference server (exposes /metrics via prometheus-client)
  - job_name: credit_scoring_inference
    static_configs:
      - targets: ["inference-server:8080"]
    metrics_path: /metrics
    scrape_interval: 10s

  # Drift detector sidecar metrics
  - job_name: drift_detector
    static_configs:
      - targets: ["drift-detector:8081"]
    metrics_path: /metrics
    scrape_interval: 15s

  # Node-level system metrics (CPU, memory, disk)
  - job_name: node_exporter
    static_configs:
      - targets: ["node-exporter:9100"]
